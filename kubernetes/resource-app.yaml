apiVersion: apps/v1
kind: Deployment

metadata:
  name: resource-app

spec:
  replicas: 1

  selector:
    matchLabels:
      app: resource-app

  template:
    metadata:
      labels:
        app: resource-app

    spec:
      containers:
        - name: resource-app
          image: polinux/stress

          command:
            - stress

          args:
            - "--cpu"
            - "2"
            - "--vm"
            - "1"
            - "--vm-bytes"
            - "256M"

          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"

            limits:
              cpu: "200m"
              memory: "128Mi"